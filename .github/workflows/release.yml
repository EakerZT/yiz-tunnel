name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_name: yiz-tunnel-linux-x86_64
            binary_name: yiz-tunnel
            archive_extension: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package_name: yiz-tunnel-windows-x86_64
            binary_name: yiz-tunnel.exe
            archive_extension: zip
          - os: macos-15-intel
            target: x86_64-apple-darwin
            package_name: yiz-tunnel-macos-x86_64
            binary_name: yiz-tunnel
            archive_extension: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            package_name: yiz-tunnel-macos-aarch64
            binary_name: yiz-tunnel
            archive_extension: tar.gz
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
      PACKAGE_NAME: ${{ matrix.package_name }}
      BINARY_NAME: ${{ matrix.binary_name }}
      ARCHIVE_EXTENSION: ${{ matrix.archive_extension }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Test
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${PACKAGE_NAME}"
          cp "target/${TARGET}/release/${BINARY_NAME}" "dist/${PACKAGE_NAME}/"
          cp README.md README.zh-CN.md "dist/${PACKAGE_NAME}/"
          tar -czf "${PACKAGE_NAME}.${ARCHIVE_EXTENSION}" -C dist "${PACKAGE_NAME}"

      - name: Package artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDirectory = "dist/$env:PACKAGE_NAME"
          New-Item -ItemType Directory -Force -Path $packageDirectory | Out-Null
          Copy-Item "target/$env:TARGET/release/$env:BINARY_NAME" "$packageDirectory/"
          Copy-Item README.md, README.zh-CN.md "$packageDirectory/"
          Compress-Archive -Path $packageDirectory -DestinationPath "$env:PACKAGE_NAME.$env:ARCHIVE_EXTENSION" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}
          path: ${{ matrix.package_name }}.${{ matrix.archive_extension }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum ./* > SHA256SUMS.txt

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" artifacts/* --clobber
          else
            gh release create "$TAG_NAME" artifacts/* \
              --title "$TAG_NAME" \
              --target "$GITHUB_SHA" \
              --generate-notes
          fi

      - name: Publish automatic build release
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          tag_name="auto-build-${GITHUB_RUN_NUMBER}-${short_sha}"
          title="自动构建版 #${GITHUB_RUN_NUMBER} (${short_sha})"
          notes="由 GitHub Actions 自动构建，来源提交：${GITHUB_SHA}。仅包含 64 位平台产物。"

          gh release create "$tag_name" artifacts/* \
            --title "$title" \
            --notes "$notes" \
            --target "$GITHUB_SHA" \
            --prerelease
